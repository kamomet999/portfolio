  <rect x="278" y="116" width="40" height="6" rx="2" fill="#cbd5e1"/>
  <rect x="278" y="124" width="24" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="248" y="142" width="116" height="30" rx="6" fill="#f1f5f9"/>
  <rect x="254" y="148" width="18" height="18" rx="4" fill="#d1fae5"/>
  <rect x="278" y="152" width="40" height="6" rx="2" fill="#cbd5e1"/>
  <rect x="278" y="160" width="24" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="248" y="178" width="116" height="30" rx="6" fill="#f1f5f9"/>
  <rect x="254" y="184" width="18" height="18" rx="4" fill="#d1fae5"/>
  <rect x="278" y="188" width="40" height="6" rx="2" fill="#cbd5e1"/>
