<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Order management mockup -->
  <rect x="80" y="55" width="440" height="250" rx="10" fill="#ffffff" opacity="0.95"/>
  <!-- Header -->
  <rect x="80" y="55" width="440" height="40" rx="10" fill="#fff7ed"/>
  <rect x="80" y="85" width="440" height="10" fill="#fff7ed"/>
  <text x="100" y="80" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7c2d12">Chefs Market</text>
  <text x="380" y="80" font-family="sans-serif" font-size="9" fill="#ea580c">受発注管理</text>
  <!-- Order cards -->
  <rect x="95" y="108" width="200" height="60" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="108" y="128" font-family="sans-serif" font-size="10" font-weight="bold" fill="#7c2d12">北海道レストランA</text>
  <text x="108" y="144" font-family="sans-serif" font-size="8" fill="#9a3412">注文: 野菜セット x3</text>
  <rect x="108" y="150" width="40" height="12" rx="6" fill="#dcfce7"/>
  <text x="114" y="159" font-family="sans-serif" font-size="7" fill="#166534">確定済</text>
  <rect x="95" y="178" width="200" height="60" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="108" y="198" font-family="sans-serif" font-size="10" font-weight="bold" fill="#7c2d12">札幌カフェB</text>
  <text x="108" y="214" font-family="sans-serif" font-size="8" fill="#9a3412">注文: 鮮魚 x5, 肉類 x2</text>
  <rect x="108" y="220" width="40" height="12" rx="6" fill="#fef9c3"/>
  <text x="114" y="229" font-family="sans-serif" font-size="7" fill="#854d0e">処理中</text>
  <!-- Stats panel -->
  <rect x="310" y="108" width="195" height="55" rx="8" fill="#f0fdf4"/>
  <text x="325" y="128" font-family="sans-serif" font-size="8" fill="#047857">月間取引額</text>
  <text x="325" y="150" font-family="sans-serif" font-size="22" font-weight="bold" fill="#065f46">¥300万</text>
  <rect x="310" y="173" width="95" height="40" rx="6" fill="#eff6ff"/>
  <text x="320" y="190" font-family="sans-serif" font-size="8" fill="#1d4ed8">FAX削減</text>
  <text x="320" y="206" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e3a8a">-80%</text>
  <rect x="415" y="173" width="90" height="40" rx="6" fill="#fef3c7"/>
  <text x="425" y="190" font-family="sans-serif" font-size="8" fill="#92400e">時間削減</text>
  <text x="425" y="206" font-family="sans-serif" font-size="14" font-weight="bold" fill="#78350f">-70%</text>
  <!-- LINE integration badge -->
  <rect x="310" y="223" width="195" height="30" rx="6" fill="#dcfce7"/>
  <text x="407" y="242" font-family="sans-serif" font-size="9" font-weight="bold" fill="#166534" text-anchor="middle">LINE API 連携</text>
  <!-- Planning badge -->
  <rect x="220" y="268" width="160" height="24" rx="12" fill="#fbbf24" opacity="0.9"/>
  <text x="300" y="284" font-family="sans-serif" font-size="10" font-weight="bold" fill="#78350f" text-anchor="middle">準備中 / Planning</text>
  <!-- Title -->
  <text x="300" y="348" font-family="sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">Chefs Market</text>
  <text x="300" y="376" font-family="sans-serif" font-size="13" fill="#fdba74" text-anchor="middle">BtoB Order Platform</text>
</svg>
