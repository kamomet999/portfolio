<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Dashboard frame -->
  <rect x="80" y="60" width="440" height="240" rx="10" fill="#ffffff" opacity="0.95"/>
  <!-- Header -->
  <rect x="80" y="60" width="440" height="40" rx="10" fill="#f8fafc"/>
  <rect x="80" y="90" width="440" height="10" fill="#f8fafc"/>
  <text x="100" y="85" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Market Price Intelligence</text>
  <!-- Price comparison bars -->
  <text x="100" y="125" font-family="sans-serif" font-size="9" fill="#64748b">競合価格比較</text>
  <rect x="100" y="134" width="280" height="14" rx="4" fill="#dbeafe"/>
  <rect x="100" y="134" width="200" height="14" rx="4" fill="#3b82f6"/>
  <text x="108" y="145" font-family="sans-serif" font-size="8" font-weight="bold" fill="#ffffff">Store A - ¥298</text>
  <rect x="100" y="154" width="280" height="14" rx="4" fill="#dbeafe"/>
  <rect x="100" y="154" width="240" height="14" rx="4" fill="#60a5fa"/>
  <text x="108" y="165" font-family="sans-serif" font-size="8" font-weight="bold" fill="#ffffff">Store B - ¥328</text>
  <rect x="100" y="174" width="280" height="14" rx="4" fill="#dbeafe"/>
  <rect x="100" y="174" width="150" height="14" rx="4" fill="#93c5fd"/>
  <text x="108" y="185" font-family="sans-serif" font-size="8" font-weight="bold" fill="#1e40af">Store C - ¥198</text>
  <!-- Trend chart -->
  <rect x="400" y="110" width="105" height="80" rx="6" fill="#f0fdf4"/>
  <text x="410" y="128" font-family="sans-serif" font-size="8" fill="#047857">価格トレンド</text>
  <polyline points="410,175 425,165 440,170 455,155 470,145 485,140 495,148" fill="none" stroke="#22c55e" stroke-width="2"/>
  <!-- KPI row -->
  <rect x="100" y="204" width="100" height="40" rx="6" fill="#eff6ff"/>
  <text x="110" y="222" font-family="sans-serif" font-size="8" fill="#1d4ed8">分析店舗数</text>
  <text x="110" y="238" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e3a8a">50+</text>
  <rect x="210" y="204" width="100" height="40" rx="6" fill="#f0fdf4"/>
  <text x="220" y="222" font-family="sans-serif" font-size="8" fill="#047857">コスト削減</text>
  <text x="220" y="238" font-family="sans-serif" font-size="16" font-weight="bold" fill="#065f46">-15%</text>
  <rect x="320" y="204" width="100" height="40" rx="6" fill="#fefce8"/>
  <text x="330" y="222" font-family="sans-serif" font-size="8" fill="#a16207">更新頻度</text>
  <text x="330" y="238" font-family="sans-serif" font-size="14" font-weight="bold" fill="#854d0e">毎日</text>
  <!-- Planning badge -->
  <rect x="220" y="260" width="160" height="24" rx="12" fill="#fbbf24" opacity="0.9"/>
  <text x="300" y="276" font-family="sans-serif" font-size="10" font-weight="bold" fill="#78350f" text-anchor="middle">準備中 / Planning</text>
  <!-- Title -->
  <text x="300" y="345" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Market Price</text>
  <text x="300" y="373" font-family="sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Intelligence Platform</text>
</svg>
